---
aid: caltech
name: California Institute of Technology
description: >-
  The California Institute of Technology (Caltech) is a private research
  university in Pasadena, California, ranked #10 in the QS World University
  Rankings 2025. Caltech's public, machine-readable footprint is concentrated
  in its research-data and astronomy infrastructure rather than a single
  central developer portal. CaltechDATA, the institutional research data
  repository, runs on InvenioRDM and exposes a public REST API and an OAI-PMH
  interface, with an accompanying open-source Python client. Caltech-operated
  IPAC runs the NASA/IPAC Infrared Science Archive (IRSA), which publishes
  Virtual Observatory (IVOA) standard APIs including TAP, Simple Cone Search,
  and Simple Image Access. There is no single unified institution-wide API
  developer portal; the official GitHub "caltech" org is an unofficial
  community group, while caltechlibrary and Caltech-IPAC host the bulk of the
  open-source code.
